; =============================================================================
; PanPilot — PlatformIO project
;
; Multi-target by design (base spec §2.1, user's BladeKey-Overhead idiom):
; every board variant is its own [env:*]; shared code is variant-agnostic and
; reads pins + capability flags from include/board_pins.h. Adding a board = a
; new env, not a fork.
;
; Display stack: LovyanGFX (factory-proven for CrowPanel Advance + matches the
; user's pinned lovyan03/LovyanGFX @ 1.2.21 in BladeKey-Overhead). NOT TFT_eSPI.
;
; Build / flash (primary bench board):
;   pio run  -e crowpanel35_advance            compile
;   pio run  -e crowpanel35_advance -t upload  flash over USB-C
;   pio test -e native                         host unit tests (needs host gcc)
; =============================================================================

[platformio]
default_envs = crowpanel35_advance

; Universal to every env (device + host).
[env]
monitor_speed = 115200
extra_scripts = pre:scripts/pio_version.py
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -I include
  -I src
; Serial -> tee redirect (Wi-Fi /log mirror) for PROJECT sources only —
; build_src_flags keeps it out of the Arduino core (which DEFINES Serial) and
; libraries. Self-guarding for C files / native tests / the simulator.
build_src_flags =
  -include serial_tee_redirect.h

; Shared by on-device (Arduino) envs only — device envs `extends = firmware`.
[firmware]
framework = arduino
monitor_filters = esp32_exception_decoder
lib_deps =
  lovyan03/LovyanGFX @ 1.2.21          ; pinned (user's known-good version)
  lvgl/lvgl @ ^8.3.11                  ; base spec §9 (LVGL 8.3)
  adafruit/Adafruit MLX90640 @ ^1.1    ; M1 thermal array (base spec §5)
  adafruit/Adafruit BusIO
  ; M8 networking (roadmap §2.2) — esp32async fork, matching the user's repos.
  tzapu/WiFiManager @ ^2.0.17
  esp32async/ESPAsyncWebServer @ ^3.6.0
  esp32async/AsyncTCP @ ^3.3.2
  knolleary/PubSubClient @ ^2.8       ; M9 MQTT + Home Assistant discovery
  ayushsharma82/ElegantOTA @ ^3       ; M10 browser OTA upload
  bblanchon/ArduinoJson @ ^7          ; M20 recipe program JSON
lib_ignore =
  Adafruit Zero DMA Library            ; MLX90640 LDF drags in this SAMD-only lib

; ---------------------------------------------------------------------------
; PRIMARY BENCH BOARD — CrowPanel Advance 3.5" HMI (ESP32-S3-WROOM-1-N16R8)
; ILI9488 480x320 SPI, GT911 cap touch. Flasher chipFamily = ESP32-S3.
[env:crowpanel35_advance]
extends = firmware
platform = espressif32 @ ^6.7.0
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_advance.csv   ; dual-OTA + LittleFS (M10)
board_build.filesystem = littlefs
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_ADVANCE
  -D BOARD_HAS_PSRAM
  ; NO ARDUINO_USB_CDC_ON_BOOT: this board's USB-C runs through a CH340K UART
  ; bridge, so the console is UART0 (bench-found: with CDC=1 the app's Serial
  ; output was invisible on the CH340 port).
  -D ENABLE_WIFI               ; M8 networking (S3 has the flash for it)
  -D HAS_FILESYSTEM            ; LittleFS partition present (sessions, custom foods)
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1   ; M10 OTA over ESPAsyncWebServer

; ---------------------------------------------------------------------------
; DIRECT-SSR build: the advance env + a locally-wired SSR trigger on IO17
; (UART1-OUT "TX" pin; bench decision 2026-07-12 — no network in the control
; path). SUPERVISED BENCH ONLY until M16/M17 pass: the fail-safe layers are in
; hal/gpio_ssr_actuator.h and an EXTERNAL 10k pulldown on the SSR input is
; required (HARDWARE_TEST "DIRECT SSR"). Normal builds never drive that pin.
[env:crowpanel35_advance_ssr]
extends = env:crowpanel35_advance
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_ADVANCE
  -D BOARD_HAS_PSRAM
  -D ENABLE_WIFI
  -D HAS_FILESYSTEM
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
  -D SSR_GPIO_PIN=17

; ---------------------------------------------------------------------------
; DEV build: same as the advance env plus a SIMULATED MLX90640 — when no real
; sensor answers the probe, SensorTask fabricates a plausible cook (ramp, hold,
; food-added dips) so the full pipeline runs on a sensor-less bench. The UI
; shows a SIMULATED banner and ASSIST arming is hard-refused in this build.
; NEVER ship this env.
[env:crowpanel35_advance_devsim]
extends = env:crowpanel35_advance
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_ADVANCE
  -D BOARD_HAS_PSRAM
  -D ENABLE_WIFI
  -D HAS_FILESYSTEM
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
  -D DEV_FAKE_SENSOR

; ---------------------------------------------------------------------------
; CrowPanel 3.5" basic (ESP32-WROVER-B) — base spec's original target.
; Pins in board_pins.h are UNVERIFIED placeholders; verify before flashing.
[env:crowpanel35_basic]
extends = firmware
platform = espressif32 @ ^6.7.0
board = esp32dev
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_BASIC
  -D BOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; ---------------------------------------------------------------------------
; Native host unit tests (base spec §3, §11). core/ and frame_analysis are
; Arduino/LVGL-free and testable here. No framework (host gcc/g++).
[env:native]
platform = native
build_flags =
  ${env.build_flags}
  -D BOARD_SIM
  -std=c++17

; ---------------------------------------------------------------------------
; LVGL desktop simulator — compiles the real ui/ + core/ against a mock sensor
; to render screenshots (kickoff §Screenshots). Headless (no SDL); wired up in
; the sim/ step. Builds with host gcc.
[env:sim]
platform = native
lib_deps = lvgl/lvgl @ ^8.3.11
build_flags =
  ${env.build_flags}
  -D BOARD_SIM
  -D PANPILOT_SIM
  -std=c++17

; ---------------------------------------------------------------------------
; SECONDARY TARGETS — CrowPanel Advance 5" HMI, 800x480 RGB-parallel ST7262
; (v1.1 pins ../cyd-radio, v1.2 pins ../BladeKey-Overhead). Same ESP32-S3-N16R8
; base as the 3.5" Advance; the display uses LovyanGFX Bus_RGB/Panel_RGB
; (src/hal/lgfx_panpilot_rgb.h). The 480x320 UI is centered on the 800x480 panel.
; COMPILE-VERIFIED only — RGB sync polarity/pclk edge + the I/O-expander
; reset/backlight sequence are bench-gated (see HARDWARE_TEST / board_pins.h).
[env:crowpanel_adv_5_v11]
extends = firmware
platform = espressif32 @ ^6.7.0
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_advance.csv
board_build.filesystem = littlefs
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL_ADV_5_V11
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ENABLE_WIFI
  -D HAS_FILESYSTEM
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1

[env:crowpanel_adv_5_v12]
extends = env:crowpanel_adv_5_v11
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL_ADV_5_V12
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ENABLE_WIFI
  -D HAS_FILESYSTEM
  -D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
