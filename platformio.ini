; =============================================================================
; PanPilot — PlatformIO project
;
; Multi-target by design (base spec §2.1, user's BladeKey-Overhead idiom):
; every board variant is its own [env:*]; shared code is variant-agnostic and
; reads pins + capability flags from include/board_pins.h. Adding a board = a
; new env, not a fork.
;
; Display stack: LovyanGFX (factory-proven for CrowPanel Advance + matches the
; user's pinned lovyan03/LovyanGFX @ 1.2.21 in BladeKey-Overhead). NOT TFT_eSPI
; — the base spec named TFT_eSPI assuming the *basic* WROVER board; the Advance
; S3 + GT911 panel is LovyanGFX in Elecrow's own demo.
;
; Build / flash (primary bench board):
;   pio run -e crowpanel35_advance                compile
;   pio run -e crowpanel35_advance -t upload      flash over USB-C
;   pio device monitor                            serial @115200
;   pio test -e native                            host unit tests (CI: no local
;                                                 host compiler on this machine)
; =============================================================================

[platformio]
default_envs = crowpanel35_advance

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -I include
lib_deps =
  lovyan03/LovyanGFX @ 1.2.21          ; pinned (user's known-good version)
  lvgl/lvgl @ ^8.3.11                  ; base spec §9 (LVGL 8.3)
  adafruit/Adafruit MLX90640 @ ^1.1    ; M1+ (thermal array)
  adafruit/Adafruit BusIO

; ---------------------------------------------------------------------------
; PRIMARY BENCH BOARD — CrowPanel Advance 3.5" HMI (ESP32-S3-WROOM-1-N16R8)
; ILI9488 480x320 SPI, GT911 cap touch. Flasher chipFamily = ESP32-S3.
[env:crowpanel35_advance]
platform = espressif32 @ ^6.7.0
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_ADVANCE
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_CDC_ON_BOOT=1

; ---------------------------------------------------------------------------
; CrowPanel 3.5" basic (ESP32-WROVER-B) — base spec's original target.
; Pins in board_pins.h are UNVERIFIED placeholders; verify before flashing.
[env:crowpanel35_basic]
platform = espressif32 @ ^6.7.0
board = esp32dev
build_flags =
  ${env.build_flags}
  -D BOARD_CROWPANEL35_BASIC
  -D BOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; ---------------------------------------------------------------------------
; Native host unit tests (base spec §3, §11). core/ and frame_analysis are
; Arduino/LVGL-free and testable here. NOTE: this machine has no host C++
; compiler, so `pio test -e native` runs in CI (GitHub Actions/Ubuntu), which
; is the source of truth for native tests + simulator screenshots.
[env:native]
platform = native
build_flags =
  -D BOARD_SIM
  -I include
  -std=c++17

; ---------------------------------------------------------------------------
; LVGL desktop simulator (SDL2) — compiles the real ui/ + core/ against a mock
; sensor for screenshots (kickoff §Screenshots). Needs a host compiler + SDL2;
; builds in CI / on a dev box with a toolchain, not on this bench machine.
; Wired up in the sim/ milestone step. See sim/README notes.
[env:sim]
platform = native
build_flags =
  -D BOARD_SIM
  -D PANPILOT_SIM
  -I include
  -std=c++17

; ---------------------------------------------------------------------------
; SECONDARY TARGETS (captured, not yet buildable) — CrowPanel Advance 5" HMI,
; RGB-parallel ST7262 (v1.1 ../cyd-radio, v1.2 ../BladeKey-Overhead). Pin maps
; live in board_pins.h under BOARD_CROWPANEL_ADV_5_V11 / _V12. The RGB display
; HAL (esp_lcd_panel_rgb / LovyanGFX RGB bus) is a follow-up once M0 is proven
; on the 3.5" bench board; uncommenting these before that path exists will not
; compile. Kept here so adding the target later is a two-line change.
